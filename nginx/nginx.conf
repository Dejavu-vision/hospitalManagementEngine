events {
    worker_connections 1024;
}

http {
    upstream hsm_app {
        server app:8080;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # HTTP — redirect to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS — serves frontend + proxies API to Spring Boot
    server {
        listen 443 ssl;
        server_name _;

        # Self-signed cert (generated on EC2 — see README below)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Root directory for frontend static files
        root /usr/share/nginx/html;
        index index.html;

        # API requests — proxy to Spring Boot backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://hsm_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /actuator/health {
            proxy_pass http://hsm_app;
            access_log off;
        }

        # Frontend static files — serve from nginx
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Cache static assets (JS, CSS, images)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
