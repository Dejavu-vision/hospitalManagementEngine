name: Sync Documentation to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.md'
      - 'curamatrix-hsm-docs/**/*.md'
      - 'README.md'
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to the wiki
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4

      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-temp
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Sync Markdown Files
        run: |
          echo "Copying documentation to wiki..."
          
          # Copy standard documentation directories if they exist
          if [ -d "docs" ]; then
            find docs -name "*.md" -type f -exec cp {} wiki-temp/ \;
          fi
          
          if [ -d "curamatrix-hsm-docs" ]; then
            find curamatrix-hsm-docs -name "*.md" -type f -exec cp {} wiki-temp/ \;
          fi
          
          # Copy root README to Wiki Home
          if [ -f "README.md" ]; then
            cp README.md wiki-temp/Home.md
          fi
          
      - name: Commit and Push to Wiki
        run: |
          cd wiki-temp
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --cached --quiet; then
            echo "No documentation changes detected, skipping wiki push."
          else
            git commit -m "docs: Automated sync of documentation to Wiki"
            git push origin HEAD
            echo "Wiki updated successfully!"
          fi
