spring:
  application:
    name: hsm

  datasource:
    url: jdbc:mysql://13.203.229.244:3306/hospitalsystems
    username: backenduser
    password: backenduser
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: curamatrix-hsm-secret-key-for-jwt-token-generation-minimum-512-bits
  expiration: 86400000  # 24 hours in milliseconds

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
