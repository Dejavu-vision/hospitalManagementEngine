spring:
  application:
    name: hsm

  datasource:
    url: jdbc:mysql://43.204.168.146:3306/hospitalsystems
    username: backenduser
    password: backenduser
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: curamatrix-hsm-secret-key-for-jwt-token-generation-minimum-512-bits
  expiration: 86400000  # 24 hours in milliseconds

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

info:
  app:
    name: CuraMatrix HSM
    description: Hospital Management System - Multi-Tenant SaaS
    version: '@project.version@'
  build:
    artifact: '@project.artifactId@'
    group: '@project.group@'

management:
  info:
    env:
      enabled: true
    git:
      mode: full
    build:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always
      show-components: always

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
