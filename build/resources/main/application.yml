spring:
  application:
    name: hsm

  datasource:
    url: jdbc:mysql://localhost:3306/hospitalsystems
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: curamatrix-hsm-secret-key-for-jwt-token-generation-minimum-512-bits
  expiration: 86400000  # 24 hours in milliseconds

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true