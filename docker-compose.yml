version: '3.8'

services:
  app:
    build: .
    container_name: hsm-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/hospitalsystems?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: curamatrix-hsm-secret-key-for-jwt-token-generation-minimum-512-bits
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hsm-network

  db:
    image: mysql:8.0
    container_name: hsm-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospitalsystems
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/COMPLETE_SAAS_SCHEMA.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hsm-network

volumes:
  mysql_data:

networks:
  hsm-network:
    driver: bridge
